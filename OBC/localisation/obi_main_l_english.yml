 sm_dtf_factory_connect_1: "Dimensional Time Fault Shipyard Control Uplink"
 sm_dtf_factory_connect_1_desc: "Access a Dimensional Time Fault Shipyard's automated systems and direct the produced vessels to this starbase."
 
