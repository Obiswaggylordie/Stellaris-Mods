# Deposits

 # Aether
 d_aether: "The Cradle of the Precursors"
 d_aether_desc: "Planet Aether. Spoy'a k'lein (Homeworld), S-Mos, Kiinlein, Guide. An ancient world of many names which has persisted alongside countless stars and planets over the eons. The ancestral home of Kas Zei'a and the birthplace of Sob'sha, Aether has gotten to know a lot of history, and seen its fair share of battles."

 d_naos_domain: "The Naos Domain"
 d_naos_domain_desc: "The Naós Domain is home to the Naós Guilds of Kas Zei'a, housing several notable people, locations and monuments within its territory. The Naós Domain is perhaps the most developed part of Aether, being as close to an ecumenopolis as the planet can get, the entire domain having countless towers stretching high into the sky, levitating buildings, and layers of artificial terrain and ground floors built ontop one another for miles, the natural surface of the Domain having long since been forgotten in order to support the capital."

 d_naos_great_temple: "The Great Temple"
 d_naos_great_temple_desc: "The Great Temple is a large and sacred building composed of 3 floors and suspended in mid-air at an incredible altitude, held by three massive arms of sorts. The monumental structure reaches high up into the sky, and it's dedicated solely to Aether's Main Energy Controller, which is located at the zenith of the structure on the third floor. The second floor holds the ceremonial ascension chamber which is used to bathe a living being in Celestial Energy in order to artifically bestow upon them Ascension. The third floor is mainly an entry nexus linked to the three supporting arms that hold the temple itself suspended, the nexus chamber is surrounded by various stasis pods. The entire Great Temple was originally constructed to be the first ever UFC powered Zei'a spacecraft as early as 54,4 million years before Perdition, back when Aether was expected to perish alongside the planet's original star. "

 d_naos_council_pavilion: "The Council Pavilion"
 d_naos_council_pavilion_desc: "The Council Pavilion is the central administrative building of Kas Zei'a, the massive building being separated into three separate circular layers. The top of the Pavilion houses its namesake, a large domed roof which is also the ceiling of the council hall. The Council Pavilion houses the entirety of The Collective Council, and all representatives appear either in person or holographically within this hall. During the time of Kas Zei'a, S-Mos' avatar was always present in the Pavilion building and rarely left the council hall. Below the Council Pavilion, one would find the chamber of the first ever Core Network Unit, this one being Unit 01 \"Aurora Mother\". "

 d_naos_hall_of_records: "Hall of Records"
 d_naos_hall_of_records_desc: "The Hall of Records is an ancient and largely ceremonial building, a tall circular tower decorated with pillars and arches, it was mainly used as the central repository of all Zei'a knowledge, information, communication, and of course records, before the inception of The Library. Though after its creation, the Hall of Records became the home of the Librarian's Guild, the entire structure being remade to host the first ever Library Transference Gate, aswell as the living spaces and various religious halls for Librarian use. The Hall of Records contain many sacred artifacts extracted from the Library, and also contains various objects or even individuals who may never set foot in it again. "

 d_naos_embassy_complex: "The Embassy Complex"
 d_naos_embassy_complex_desc: "The Embassy Complex is the home of the Naós Guild's Legatus branch, an enormous facility filled with offices, diplomatic halls, conference rooms, recording studios, shuttle bays. Despite its name, the Embassy Complex was the heart of Kas Zei'as newsfeeds, being as much responsible for internal affairs as external affairs, the Legatii worked tirelessly within the complex to mediate the Guilds and spread necessary messages or words to even the outermost of colonies, all the while they'd work with non-Zei'a locally and offworld in terms of diplomacy and negotiations."

 d_naos_city_ship_hex_docks: "City-Ship Hex Docks"
 d_naos_city_ship_hex_docks_desc: "The City-Ship Hex Docks is an expanse of vast hexagonal landing sites, each 45km in radius. Designed so that the colossal City-Ships can comfortably land within them and allow for loading and unloading, aswell as technological interfacing. The Hex Docks are deep and can fully fit the City-Ship, outfitted with countless anti-gravity field emitters to balance and hold the cities at a constant altitude, allowing maintenance staff to easily reach the under-city to affect repairs or retrofits."

 d_agon_domain: "The Agon Domain"
 d_agon_domain_desc: "The Agon Domain is home to the Agon Guilds of Kas Zei'a, once an arid landscape, it's now become an endless factory. Smoke plooms up into the sky as far as the eye can see, with ships and Uviik transporting countless tonnes of cargo and resources in orderly skylanes, traffic on the surface is constant with the everpresent sound rumbling of feet and transports. Shipyards launch great vessels, and massive landing pads receive all kinds of ships bearing all forms of crew and cargo. And littered between, as if there's some order to the madness, are giant garrison buildings filled with soldiers and troops, military academies, and gladiatorial arenas."

 d_agon_colosseum: "The Colosseum"
 d_agon_colosseum_desc: "The Colosseum is the core of all Bellator activity, a massive circular tower that encapsulates an enormous portion of land. The main floor of the Colosseum in its centre, surrounded by its high walls, is a fully artificial environment capable of being adjusted in virtually every facet, from atmosphere, to gravity, to obstacles, terrain, fauna, flora. Its purpose is to simulate any potential situation in order to host grand tournaments and games. It's was also used as the proving grounds for the Grand Bellators, allowing them to engage in vicious duels, and brutal war games."

 d_agon_grand_factorum: "The Grand Factorum"
 d_agon_grand_factorum_desc: "The Grand Factorum is the central foundry and processing district on the entire planet. While large portions of the Agon Domain is already dedicated to production, The Factorum is the beating heart of the entire industry. Everything that the Agon Aedifex population does can be traced back to this sector of towering factories and manufacturers, the skyline between the giant processing plants and smoke plumes is completely swarmed by a storm of Uviik who relentlessly transport and maintain the structures." 

 d_torvus_domain: "The Torvus Domain"
 d_torvus_domain_desc: "The Torvus Domain is home to the Torvus Guilds of Kas Zei'a, a vast jungle that's being endlessly peppered by torriential downpour, a humid and vibrant place with bioluminescent life, both flora and fauna alike. Trees towering as tall as buildings, and vast powerful rivers formed by the constant rainfall crashing through the forest below, converging at the lowest points of the Domain. Together they form vast marshy swamps and bogs filled with even more diverse life. One can hardly even register the presence of Kas Zei'a itself within the Domain, as their technology, architecture, and infrastructure, are all readily overgrown by the bustling ecosystem, the otherwise polished white-grey metals of Zei'a design being muddied and covered with vines and plants, the nature around them interfacing and merging with the bio-crystalline technology in Zei'a installations."

 d_torvus_central_hydrodynamo: "The Central Hydrodynamo"
 d_torvus_central_hydrodynamo_desc: "The Central Hydrodynamo is a colossal underwater complex which generates vast amounts of power through hydro-energy, providing the Torvus Guilds with all the energy they need to perform their experiments, or generally cohabitate with the nature around them. The Hydrodynamo, much like all other areas of the Torvus Domain, is linked to the vast transport tube network, and acts as a form of hub due to its size, allowing travellers through the Domain to easily cross it or find their way elsewhere within it."

 d_torvus_preserve: "The Preserve"
 d_torvus_preserve_desc: "The Torvus Preserve is the largest building on the surface of the Domain, its walls darkened with roots, mud, and various plantlife. The Preserve holds the Torvus Guild's Partus laboratories, the home of all genetic experimentation and bio-engineering projects, where all potential designs are tested, developed, and perfected before being deployed to their designated worlds. The Preserve's central control is directly linked with The Library, specifically displaying and fetching all information about life present in the Library's reach, allowing the Torvus Guild to monitor and predict potential health concerns in civilisations before they may even know of it themselves, or avert ecological disasters on remote planets beyond anyone's jurisdiction."

 d_fanum_domain: "The Fanum Domain"
 d_fanum_domain_desc: "The Fanum Domain is the home to the Fanum Guilds of Kas Zei'a, nestled away in the height of Aether's mountains, bridged and strewn across the various peaks. Home to the most bleeding edge of Zei'a advancements, the Fanum Domain has always been the most sophisticated in design and architecture, streaks, lines, and conduits of neon energy flowing through the massive facilities, Uviik patrolling and swarming around the tall chambers and towers of the Domain, Hardlight infrastructure is frequently in play, with paths, bridges, platforms, vehicles, and equipment, all being materialised into existence at will and dispersed when necessary."

 d_fanum_hall_of_astronomy: "The Hall of Astronomy"
 d_fanum_hall_of_astronomy_desc: "The Hall of Astronomy is hidden deep within the mountains of Fanum. Taking shape as an enormous spherical chamber comparable to a stadium, the Hall is visually dark and littered with holographic emitters, floating platforms roam the massive chamber to examine images and representations of celestial objects, vessels, or even people, the system is connected directly to The Library and is actively provided with a live feed from all Zei'a technology, giving the Hall absolute sight and telemetry on everything within the sphere of Kas Zei'as influence. The Hall of Astronomy holds special Void-based sensors, capable of calculating and affecting changes to the Void in order to allow the operators of the Hall to see through higher and lower dimensions, examine the universe on subatomic lengths or on gigaparsec terms, beyond what normal sensor resolutions can manage, while granting transparent view into other timelines and even universes."

 d_fanum_sanctuary_fortress: "The Sanctuary Fortress"
 d_fanum_sanctuary_fortress_desc: "Sanctuary Fortress is the deep-vault of the Fanum Domain, home to the exceedingly dangerous scientific fields, or the top secret. Equipped with the most sophisticated and newest of Zei'a technology, even the ones that haven't been deployed yet, the facility lives up to its name as a Sanctuary, and a Fortress, being widely recognised as unbreachable, and unconquerable, should Aether fall then Sanctuary will remain to continue the fight. One may find many terrible things within its shielded depths, weapons of mass destruction, memory-foam of all things, artificial stars, a black hole or two, and the most deranged and inspired minds of Kas Zei'a, certifiably capable of blowing up a planet with a mouse trap, and landing a paper clip on the sun."


 # Time Faults
 d_cr_dtf: "Dimensional Time Fault"
 d_cr_dtf_desc: "An esoteric void-based spatial pocket, its interior dimensions are far larger than what should logically be fit in the small area which the anomaly resides in. Time seems to be flowing drastically differently within it in comparison to the rest of the universe aswell, what could possibly make something like this?"


 # The Citadel
 d_citadel_wards: "Citadel Wards"
 d_citadel_wards_desc: "The 'arms' of the Citadel, known as the Wards, constitute the residential and commercial sectors of the station. They are densely populated, housing millions of residents in the numerous skyscrapers which rise from the superstructure."
 d_citadel_presidium: "Naós Presidium"
 d_citadel_presidium_desc: "Located in the 10km wide central ring of the station, the Presidium is a massive, park-like complex containing the offices of the various branches of government. The Presidium also hosts the Pan-Galactic Assembly, a convention floor for all races in diplomatic contact to meet and engage diplomatically with eachother."
 d_citadel_tower: "Citadel Tower"
 d_citadel_tower_desc: "The Citadel Tower is at the epicentre of the massive Citadel. Rising parallel to the station's Wards, it houses the Council Chambers, the main traffic control for the station, and the galactic Relay network control center."
 d_citadel_csec: "Agon Security Branch"
 d_citadel_csec_desc: "The Citadel is policed by the Citadel Agon Security Branch (C-Sec), whose offices and custody suites are located in the Lower Wards."
 d_citadel_keeper_workshops: "Huragok Workshops"
 d_citadel_keeper_workshops_desc: "The Citadel Station is maintained by the bio-engineered Huragok, a mindless servant race that roams the station in search of problems to solve."
 d_citadel_huerta_memorial_hospital: "Torvus Medical Sector"
 d_citadel_huerta_memorial_hospital_desc: "Touted as a leader in premium medical care, The Torvus Medical Sector's staff and facilities can accommodate any known race. It has hundreds of full time menders and thousands of support staff, and many of its experts also specialize in xenobiology, xenomedicine, and genetics. Virtually any medicinal need or service can be found and met within the medical sector."
 d_citadel_joint_research_division: "Citadel Fanum Research Division"
 d_citadel_joint_research_division_desc: "The Citadel is home to a vast Fanum science and knowledge division, it employs scientist and researchers to carry out their work in order to provide independent scientific advice and support to the Citadel and its allies. Their responsibilities are to create, manage and make sense of any knowledge that may support the Citadel, anticipate emerging issues that need to be addressed at Council level, and to share know-how with Citadel allies, the scientific community, and newcomers to the Galactic Community."
 d_citadel_relay_control: "Relay Network Control Center"
 d_citadel_relay_control_desc: "This control center allows whoever holds the station to gain access to the knowledge and technology of the galactic relay network, aswell as allowing them to instantaneously assume control of and reconfigure any existing relay."
 d_citadel_inactive_relay_control: "Inactive Control center"
 d_citadel_ianctive_relay_control_desc: "This control center is inactive, no matter what our scientists and engineers try nothing will function, nor do we know what this place is supposed to do."


 # Chair Outpost
 d_chair_outpost: "Chair Outpost"
 d_chair_outpost_desc: "An odd Outpost of some sort, there's a weird chair in the centre of the facility. It seems to be inactive."
 d_chair_outpost_active: "Drone Weapons Chair Outpost"
 d_chair_outpost_active_desc: "The weapons chair outpost is fully operational, ready to intercept and destroy any potential attackers."


 # Attero
 d_attero_device: "Attero Device"
 d_attero_device_desc: "The Attero Device is a specialised disruptive field emitter that pollutes hyperspace and subspace with various destructive energies, specifically targeted at the frequencies of hostile FTL engines, the result is the instantaneous obliteration of enemy ships entering their range."
 d_attero_device_inactive: "Inactive Attero Device"
 d_attero_device_inactive_desc: "A slumbering defensive mechanism of unimaginable power and devastation."


 # City-Ship
 d_city_ship: "Zei'a City-Ship"
 d_city_ship_desc: "City-Ships are colossal testaments of engineering produced by Kas Zei'a, they can comfortably host several million Kvil'sha and are entirely automated by Uviik. City-Ships were typically deployed to worlds to become colony capitals and strategic coordination centres for nearby battlegroups fighting against the Scourge."


 # Energy Controller
 d_energy_controller: "Zei'a Energy Controller Network"
 d_energy_controller_desc: "Energy Controllers are powerful Zei'a devices capable of asserting control over all energy in any state, from siphoning thermal energy and heat from one object and transferring it to another, all the way to manipulating Celestial Energy itself."

 d_light_shaft: "Light Shafts"
 d_light_shaft_desc: "The Light Shafts are a transportation system designed by Kas Zei'a, by utilising the energy controller network. Objects and travellers can be transformed into energy momentarily and be instantaneously beamed to another energy controller in the network."

 d_energy_controller_empty: "Depleted Zei'a Energy Controller Network"
 d_energy_controller_empty_desc: "Energy Controllers are powerful Zei'a devices capable of asserting control over all energy in any state, from siphoning thermal energy and heat from one object and transferring it to another, all the way to manipulating Celestial Energy itself."


