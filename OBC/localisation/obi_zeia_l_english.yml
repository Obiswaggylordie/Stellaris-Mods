# Traits
 trait_sobsha: "Sob'sha"
 trait_sobsha_desc: "The original founders of Kas Zei'a, an insectoid races which evolved on Aether 54 million years before the activation of the Perdition Device."

 trait_kvilsha: "Kvil'sha"
 trait_kvilsha_desc: "The aristocratic elite of Kas Zei'a, effectively the ruling class. They are considered to be nobles within the collective, originally having started out as genetically enhanced Sob'sha, their engineered evolution has long since had them outclass their naturally evolved siblings, being smarter, faster, stronger, and far more innately talented than a sob'sha."

 trait_uviik: "Uviik"
 trait_uviik_desc: "The Synthetics, or Kas Uviik. Are the artificial bio-crystalline based machine intelligences of the Collective, their name is a broad term to specify practically all forms of mobile and autonomous machinery within the collective."

