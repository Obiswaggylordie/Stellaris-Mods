# Technology
 tech_zeia_biocomputing: "Zei'a Biocomputing"
 tech_zeia_biocomputing_desc: "The first ever computer invented by Kas Zei'a was biological in nature, it is a fundamental aspect of their technology."

 tech_zeia_biocrystalline: "Zei'a Bio-Crystalline Technology"
 tech_zeia_biocrystalline_desc: "The Bio-Crystalline technology of Kas Zei'a is a unique and versatile form of technology, crystals are programmed and grow their own internal components to fulfill their tasks. They are found in all Zei'a technology and architecture."

 tech_zeia_kvilsha_project: "The Kvil'sha Project"
 tech_zeia_kvilsha_project_desc: "Kas Zei'a seeks perfection in the impossible, forcing the laws of nature to submit to their will, continuing to draft up genes after genes, the shape of these Kvil'sha being a stark difference to their original Sob'sha visage. Their total psionic power had been evolved to greater heights, and their potential was projected to be leagues ahead of any Sob'sha."

 tech_zeia_dimeng: "Zei'a Dimension Engine"
 tech_zeia_dimeng_desc: "The Dimension Engine is an incredible machine capable of harnessing an infinite amount of dimensional energy from the universe itself, though in limited amounts as extracting too much with little control would provoke enormous repercussions."
 
 tech_zeia_sdc: "Zei'a Super Dimension Core"
 tech_zeia_sdc_desc: "The Super Dimension Core is an alternate take on the Dimension Engine concept, by taking the Dimension Core and utilising tetradimensional engineering to produce a pocket universe within the core."

 tech_zeia_energy_controller: "Zei'a Energy Controllers"
 tech_zeia_energy_controller_desc: "The Energy Controllers are powerful Zei'a devices capable of asserting control over all energy in any state, from siphoning thermal energy and heat from one object and transferring it to another, all the way to manipulating Celestial Energy itself."

 tech_zeia_energy_transfer_module: "Energy Transfer Module"
 tech_zeia_energy_transfer_module_desc: "A specialized energy containment device, capable of transferring vast amounts of celestial energy between controllers."

 tech_zeia_light_shaft: "Light Shafts"
 tech_zeia_light_shaft_desc: "The Light Shafts are a transportation system designed by Kas Zei'a, by utilising the energy controller network. Objects and travellers can be transformed into energy momentarily and be instantaneously beamed to another energy controller in the network."

 tech_zeia_ufc: "The Reality Code"
 tech_zeia_ufc_desc: "Originally known as the Universal Force Constant Principle. The Reality Code is a scientific and causal theorem based around the concept of the universe being linked to an infinite web of other universes through a mystical force of reality itself."

 tech_void_science: "Void Science"
 tech_void_science_desc: "Kas Ehwar, more commonly known as The Void. A mystical warping expanse of what can only be described as cosmic soup and nothingness, the Void continously shifts and transforms, like ink in water, or light through a diamond. Travel through the Void will see it take shapes reminiscent of dazzling nebulae and the surface of stars, to shadowed spaces of swirling darkness. Space and time seemingly refracting and bending infinitely in the distance of the Void, and more times than not you may encounter yourself passing by, be it your current self, future, or past. And in the midst of all this wonder, one may also encounter serenity, pockets of nothingness so absolute that they swallow up the light you shine at them."

 tech_void_dtf: "Dimensional Time Faults"
 tech_void_dtf_desc: "A Dimensional Time Fault, or simply a time fault, is a special dimensional pocket created by Kas Zei'a through Void manipulation. A Time Fault is a pocket of space-time that is both unrestricted by physical space and chronological time, a Time Fault can be several times larger than whatever houses it and as its name suggests, time can flow quite differently within it."

 tech_void_relay: "Void Relay Construction"
 tech_void_relay_desc: "Void Relays are sophisticated Kas Zei'a kilostructures capable of opening rifts in real space which lead into The Void, these rifts can be focused into targetting virtually any location in the universe and even beyond."

 tech_void_drive: "The Hypertransplanar Distortion Engine"
 tech_void_drive_desc: "The Hypertransplanar Distortion engine, more commonly known as the Void Drive. Is the most technologically advanced Faster-Than-Light engine in the universe, pioneered by Sentinels Min'dok'zu-Ahrk-Munin'zu and A'skao'zu-Ahrk-Min'dek'zu-Uko-Frul'zul following their successful development of its stationary counterpart, the void Relay."

 tech_zeia_thrust: "Zei'a Inertia Manipulator"
 tech_zeia_thrust_desc: "The Zei'a Inertia Manipulator, also known as the Main Thrust. Is an advanced form of propulsion which directly applies directional vectors upon its connected grid, allowing it omni-directional \"thrust\" through simply forcing physics to move the object. Main Thrust can move virtually anything with little effort, only limited by its power requirements."

 tech_void_shroud: "Void Shroud"
 tech_void_shroud_desc: "Void Shrouds function similarly to a phase-shifter, except that it phases its intended target partly into the Void. This functions to completely eliminate any trace of its existence in any discernable manner, where not even Ascended Beings can detect it. The shrouded may pass through any material and remain entirely undetected and unaffected by several noticeable physical laws such as mass, gravity, and even time. The only method of communicating or affecting anything through a Void Shroud is to utilise other Void based technologies, or harness metaphysical forces. This is how numerous shrouded Installations and vessels were still struck by the Perdition Wave."

 tech_mcd: "Molecular Construction Device"
 tech_mcd_desc: "The Molecular Construction Device is a powerful piece of Zei'a technology capable of manipulating matter on a molecular level, allowing it to construct or deconstruct any object, from the smallest of tools to entire planets, and even stars. The MCD is the core component of the City-Ships, allowing them to materialise and dematerialise their own structures at will, aswell as being used in various other applications such as the construction of megastructures, or even the creation of weapons of mass destruction"

 tech_omega_alloy: "Zei'a Omega Alloy"
 tech_omega_alloy_desc: "Omega Alloy can be called a form of refined Nuclear Pasta, easily being 10 billion (10,000,000,000) times more durable than steel. Kas Zei'a later found the means of utilising Matter-Energy Converters to produce Omega Alloy without the lengthy synthesization process, this in turn meant that Kas Zei'a could actively produce and maintain Omega Alloy far easier."

 tech_zeia_shield: "Zei'a Shielding"
 tech_zeia_shield_desc: "Zei'a Shielding has no internal capacity of its own and instead uses the power its given to form a shield. However due to this, Zei'a Shielding has no upper limit of capacity either. It can simply become exponentionally stronger based solely on the amount of power it's fed."

 tech_dtf_cosmoreverse: "The Cosmoreverse System"
 tech_dtf_cosmoreverse_desc: "A supremely powerful celestial energy manipulation device, capable of creating abberations in time and space through the Void, or transforming entire planets into any number of alternatives."

 tech_dtf_access: "Time Fault Facilities"
 tech_dtf_access_desc: "After lengthy study of these 'Time Faults', we have found the method of entering them safely and even utilising their esoteric properties for our own benefit."

 tech_aurora_class: "Aurora-Class Uviik"
 tech_aurora_class_desc: "The Aurora class Uviik, occasionally refered to as the 'CNU-Type', is the most sophisticated bio-crystalline neural network ever conceived by the Collective. The Aurora classification, as insinuated. Was made specifically for the Core Network Units; the synthetic stewards of the Collective's 'Core Network'. These units were so drastically superior to every other Uviik, designed to be a compound consciousness of countless parallel minds. By every measurable metric, Aurora class Uviik are the only organisms in existence capable of being remotely compared to an Ascended energy based consciousness."

# Planet Classes
 pc_obicitadel: "Citadel Station"
 pc_obicitadel_desc: "This megastructure of a station acts as a capital in of itself, allowing empires to settle the heart of their vast civilisations within it. The station's primary purpose is to facilitate the control of the galactic relay network, to this end the station also functions as a nigh-impenetrable fortress and bastion against anyone who would attempt to seize control over the relays."

